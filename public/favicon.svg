<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#FFF3E0"/>

  <!-- Open book - left page (slightly angled inward) -->
  <path d="M6 19 Q6 15 10 15.5 L30 17 L30 49 L10 47.5 Q6 47 6 43 Z" fill="#FF8F00"/>
  <!-- Left page inner (cream) -->
  <path d="M8 20 Q8 17 11 17.5 L28 18.8 L28 47 L11 45.8 Q8 45.5 8 42.5 Z" fill="#FFF8E1"/>

  <!-- Open book - right page -->
  <path d="M34 17 L54 15.5 Q58 15 58 19 L58 43 Q58 47 54 47.5 L34 49 Z" fill="#FF8F00"/>
  <!-- Right page inner (cream) -->
  <path d="M36 18.8 L53 17.5 Q56 17 56 20 L56 42.5 Q56 45.5 53 45.8 L36 47 Z" fill="#FFF8E1"/>

  <!-- Spine -->
  <rect x="29" y="15" width="6" height="34" rx="3" fill="#E65100"/>

  <!-- Left eye (left page, pupil looking RIGHT) -->
  <!-- Eyelid upper arc -->
  <ellipse cx="19" cy="33" rx="6.5" ry="5.5" fill="white"/>
  <ellipse cx="19" cy="33" rx="6.5" ry="5.5" fill="none" stroke="#BF360C" stroke-width="1.2"/>
  <!-- Upper eyelid shadow -->
  <path d="M12.5 30.5 Q19 27 25.5 30.5" stroke="#BF360C" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Iris -->
  <circle cx="21" cy="33.5" r="3.2" fill="#5D4037"/>
  <!-- Pupil -->
  <circle cx="21.5" cy="33.5" r="1.8" fill="#1A1A1A"/>
  <!-- Eye highlight -->
  <circle cx="22.5" cy="32.2" r="1" fill="white"/>
  <!-- Small eyelashes top-left -->
  <line x1="13.5" y1="29.5" x2="12.5" y2="27.5" stroke="#BF360C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="28.5" x2="15.5" y2="26.5" stroke="#BF360C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="18.5" y1="28" x2="18.5" y2="26" stroke="#BF360C" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Right eye (right page, pupil looking RIGHT) -->
  <ellipse cx="45" cy="33" rx="6.5" ry="5.5" fill="white"/>
  <ellipse cx="45" cy="33" rx="6.5" ry="5.5" fill="none" stroke="#BF360C" stroke-width="1.2"/>
  <!-- Upper eyelid shadow -->
  <path d="M38.5 30.5 Q45 27 51.5 30.5" stroke="#BF360C" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Iris -->
  <circle cx="47" cy="33.5" r="3.2" fill="#5D4037"/>
  <!-- Pupil -->
  <circle cx="47.5" cy="33.5" r="1.8" fill="#1A1A1A"/>
  <!-- Eye highlight -->
  <circle cx="48.5" cy="32.2" r="1" fill="white"/>
  <!-- Small eyelashes top-right -->
  <line x1="39.5" y1="29.5" x2="38.5" y2="27.5" stroke="#BF360C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="42" y1="28.5" x2="41.5" y2="26.5" stroke="#BF360C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="44.5" y1="28" x2="44.5" y2="26" stroke="#BF360C" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Star sparkle top-right -->
  <g transform="translate(51,10)">
    <path d="M3.5 0 L4.3 2.5 L7 3.5 L4.3 4.5 L3.5 7 L2.7 4.5 L0 3.5 L2.7 2.5 Z" fill="#FFD54F"/>
  </g>
</svg>
