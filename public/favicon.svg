<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#FFF3E0"/>

  <!-- Book body -->
  <rect x="14" y="16" width="36" height="28" rx="4" fill="#FF8F00"/>
  <!-- Book spine -->
  <rect x="14" y="16" width="6" height="28" rx="3" fill="#E65100"/>
  <!-- Book pages (right side) -->
  <rect x="20" y="18" width="28" height="24" rx="2" fill="#FFF8E1"/>

  <!-- Book lines (text lines) -->
  <rect x="24" y="24" width="18" height="2.5" rx="1.2" fill="#FFCC80"/>
  <rect x="24" y="29" width="14" height="2.5" rx="1.2" fill="#FFCC80"/>
  <rect x="24" y="34" width="16" height="2.5" rx="1.2" fill="#FFCC80"/>

  <!-- Star sparkle top-right -->
  <g transform="translate(43, 13)">
    <path d="M4 0 L4.9 2.9 L8 4 L4.9 5.1 L4 8 L3.1 5.1 L0 4 L3.1 2.9 Z" fill="#FFD54F"/>
  </g>

  <!-- Small star bottom-left -->
  <g transform="translate(12, 40)">
    <path d="M2.5 0 L3.1 1.8 L5 2.5 L3.1 3.2 L2.5 5 L1.9 3.2 L0 2.5 L1.9 1.8 Z" fill="#FFD54F" opacity="0.7"/>
  </g>

  <!-- Tori character - small bunny ears above book -->
  <ellipse cx="29" cy="15" rx="2.5" ry="4" fill="#FFAB91" opacity="0.9"/>
  <ellipse cx="35" cy="14" rx="2.5" ry="4" fill="#FFAB91" opacity="0.9"/>
  <ellipse cx="29" cy="15.5" rx="1.2" ry="2.8" fill="#FF8A65" opacity="0.6"/>
  <ellipse cx="35" cy="14.5" rx="1.2" ry="2.8" fill="#FF8A65" opacity="0.6"/>
</svg>
